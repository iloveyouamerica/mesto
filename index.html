<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body class="page">
  <div class="wrapper">
    <header class="header">
      <img src="./images/header/logo.svg" alt="Логотип страницы в заголовке." class="header__logo">
    </header>
    <main class="main">
      <section class="profile">
        <img src="./images/profile-info/profile-photo.jpg" alt="Улыбающийся Жак-Ив Кусто в красной шапке и синей рубашке на фоне моря" class="profile__image">
        <div class="profile__text-wrapper">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <button type="button" class="profile__button-edit button"></button>
          <p class="profile__about">Исследователь океана</p>
        </div>
        <button type="button" class="profile__button-add button"></button>
      </section>
      <section class="elements">
        <ul class="elements__list">
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/karachaevsk.jpg" alt="Карачаевск - старинная постройка на вершине зелёной горы." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Карачаевск</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/elbrus.jpg" alt="Гора Эльбрус - вид издалека на рассвете." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Гора Эльбрус</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/dombay.jpg" alt="Домбай - вид горы в пасмурную погоду." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Домбай</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/elbrus.jpg" alt="Гора Эльбрус - вид издалека на рассвете." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Гора Эльбрус</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/dombay.jpg" alt="Домбай - вид горы в пасмурную погоду." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Домбай</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
          <li class="elements__list-item">
            <article class="elements__card card">
              <img src="./images/elements/karachaevsk.jpg" alt="Карачаево-Черкессия - старинная постройка на вершине зелёной горы." class="card__image">
              <div class="card__description">
                <h2 class="card__title">Карачаево-Черкессия</h2>
                <button type="button" class="card__like" aria-label="Поставить лайк"></button>
              </div>
            </article>
          </li>
        </ul>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">© 2022 Mesto Russia</p>
    </footer>
    <div class="popup">
      <div class="popup__container">
        <button type="button" class="popup__close-btn button"></button>
        <form method="POST" name="user-data" class="popup__form form">
          <h3 class="form__title">Редактировать профиль</h3>
          <input type="text" name="user-name" class="form__input" id="input-name" placeholder="Имя">
          <input type="text" name="user-about" class="form__input" id="input-about" placeholder="О себе">
          <button type="submit" class="form__submit">Сохранить</button>
        </form>
      </div>
    </div>
  </div>
  <script src="./scripts/index.js"></script>
</body>
</html>
